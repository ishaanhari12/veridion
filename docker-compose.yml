services:
  db:
    image: postgres:16-alpine
    container_name: veridion_db
    environment:
      POSTGRES_USER: veridion
      POSTGRES_PASSWORD: veridion_secret
      POSTGRES_DB: veridion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veridion"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veridion_api
    environment:
      DATABASE_URL: postgresql://veridion:veridion_secret@db:5432/veridion
      TEST_DATABASE_URL: postgresql://veridion:veridion_secret@db:5432/veridion_test
      SECRET_KEY: changeme_replace_with_python_secrets_token_hex_32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: development
      FRAUD_SERVICE_URL: http://fraud:8001
      FRAUD_BLOCK_THRESHOLD: "0.85"
      FRAUD_FLAG_THRESHOLD: "0.50"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  fraud:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: veridion_fraud
    ports:
      - "8001:8001"
    volumes:
      - ./ml:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  postgres_data:
