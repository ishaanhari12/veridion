name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Lint, security scan, tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: veridion
          POSTGRES_PASSWORD: veridion_secret
          POSTGRES_DB: veridion
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # In CI, postgres runs on localhost (not a docker service named 'db')
      DATABASE_URL: postgresql://veridion:veridion_secret@localhost:5432/veridion
      TEST_DATABASE_URL: postgresql://veridion:veridion_secret@localhost:5432/veridion_test
      SECRET_KEY: ci_test_secret_key_32_characters_minimum_length
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: test
      FRAUD_SERVICE_URL: http://localhost:8001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Create test database
        run: |
          PGPASSWORD=veridion_secret psql -h localhost -U veridion -d veridion -c "CREATE DATABASE veridion_test;"

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r backend/app -ll -ii

      - name: Run migrations
        run: cd backend && alembic upgrade head

      - name: Run tests
        run: cd backend && pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    name: Docker build check
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t veridion-api ./backend

      - name: Build ML image
        run: docker build -t veridion-fraud ./ml
